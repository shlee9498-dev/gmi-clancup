<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>G드컵 시즌2 · 점수 입력</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root{--bg:#0a0a0c;--card:#16161c;--elev:#1d1d25;--line:#27272a;--ink:#f4f4f5;--dim:#a1a1aa;--faint:#71717a;
    --gold:#f5c518;--green:#10b981;--blue:#5ac8fa;--red:#e63946;--display:'Archivo Black',sans-serif;--body:'Pretendard Variable',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.5;padding:0 14px 90px;}
  .wrap{max-width:760px;margin:0 auto;}
  .top{position:sticky;top:0;background:rgba(10,10,12,.95);backdrop-filter:blur(8px);padding:14px 0 12px;z-index:5;border-bottom:1px solid var(--line);}
  .kick{font-family:var(--display);letter-spacing:.28em;color:var(--gold);font-size:12px;}
  h1{font-size:20px;font-weight:800;margin:4px 0 10px;}
  .tabs{display:flex;gap:8px;}
  .tabs button{flex:1;background:var(--elev);border:1px solid var(--line);color:var(--ink);font-family:var(--body);
    font-weight:800;font-size:15px;padding:11px;border-radius:10px;cursor:pointer;}
  .tabs button.on{background:var(--gold);color:#1a1500;border-color:var(--gold);}
  .bar{display:flex;gap:8px;align-items:center;margin-top:10px;}
  .bar .saveall{flex:1;background:var(--green);color:#04261b;border:none;font-weight:800;font-size:15px;padding:12px;border-radius:10px;cursor:pointer;}
  .bar a{color:var(--dim);font-size:13px;text-decoration:none;white-space:nowrap;}
  .bar a:hover{color:var(--ink);}
  .note{font-size:12px;color:var(--faint);margin:10px 2px 4px;}
  .tcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-top:9px;}
  .trow{display:grid;grid-template-columns:1fr 84px 70px auto;gap:8px;align-items:center;}
  .tn{font-weight:800;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tn .tw{color:var(--faint);font-size:12px;font-weight:700;margin-left:6px;}
  select,input{background:var(--elev);border:1px solid var(--line);color:var(--ink);border-radius:8px;
    padding:9px 8px;font-size:15px;font-family:var(--body);width:100%;}
  input[readonly]{color:var(--faint);}
  .save{background:var(--gold);color:#1a1500;border:none;font-weight:800;border-radius:8px;padding:9px 12px;cursor:pointer;white-space:nowrap;}
  .save.done{background:var(--green);color:#04261b;}
  .ptoggle{grid-column:1/-1;justify-self:start;margin-top:8px;background:none;border:1px solid var(--line);
    color:var(--dim);border-radius:8px;padding:6px 11px;font-size:13px;cursor:pointer;}
  .ptoggle:hover{color:var(--ink);border-color:var(--gold);}
  .players{grid-column:1/-1;margin-top:9px;border-top:1px dashed var(--line);padding-top:9px;display:none;}
  .players.show{display:block;}
  .prow{display:grid;grid-template-columns:1fr 78px;gap:8px;align-items:center;margin:5px 0;}
  .prow label{font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .psum{font-size:13px;color:var(--gold);font-weight:700;margin-top:6px;}
  .msg{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--elev);border:1px solid var(--line);
    padding:11px 18px;border-radius:10px;font-size:14px;display:none;z-index:9;box-shadow:0 10px 30px rgba(0,0,0,.5);}
  .msg.show{display:block;}
  .gate{max-width:380px;margin:80px auto;text-align:center;}
  .gate input{margin:14px 0;}
  .gate button{background:var(--gold);color:#1a1500;border:none;font-weight:800;padding:12px 22px;border-radius:10px;cursor:pointer;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">

  <div class="gate" id="gate">
    <div class="kick">G드컵 SEASON 2</div>
    <h1>점수 입력 — 관리자 확인</h1>
    <input type="password" id="keyInput" placeholder="관리자 키">
    <div><button id="keyBtn">입장</button></div>
    <div class="note" id="gateMsg"></div>
  </div>

  <div id="app" class="hidden">
    <div class="top">
      <div class="kick">G드컵 SEASON 2</div>
      <h1>본매치 점수 입력</h1>
      <div class="tabs">
        <button data-r="3" class="on">ROUND 3</button>
        <button data-r="4">ROUND 4</button>
        <button data-r="5">ROUND 5</button>
      </div>
      <div class="bar">
        <button class="saveall" id="saveAll">이 라운드 전체 저장</button>
        <a href="results.html" target="_blank">순위화면</a>
        <a href="kill-mvp.html" target="_blank">MVP화면</a>
      </div>
    </div>
    <div class="note">팀별 <b>순위</b> + <b>팀 총킬</b>만 넣어도 순위표 됩니다. 킬 MVP까지 하려면 <b>선수별</b>을 펼쳐 각자 킬 입력(합계가 팀 총킬). 저장은 팀마다 또는 위 "전체 저장".</div>
    <div style="background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-top:10px;">
      <div style="font-weight:800;margin-bottom:8px;">🤖 PUBG 자동 불러오기 <span style="color:var(--faint);font-weight:600;font-size:12px;">라운드 끝나면 클릭</span></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <select id="apPlat" style="flex:0 0 auto;width:auto;">
          <option value="kakao">카카오</option>
          <option value="steam">스팀</option>
        </select>
        <input id="apWho" placeholder="참가 선수 인게임닉 (또는 매치ID)" style="flex:1;min-width:150px;">
        <button id="apBtn" class="save" style="flex:0 0 auto;">불러오기</button>
      </div>
      <div style="font-size:12px;color:var(--faint);margin-top:8px;">참가 선수 닉 하나만 넣으면 그 사람의 <b>최근 매치</b>에서 16팀 순위·킬을 자동으로 채웁니다. 채운 뒤 검토하고 "전체 저장". (PUBG 키 필요)</div>
    </div>
    <div id="list"></div>
  </div>

</div>
<div class="msg" id="msg"></div>

<script>
(function(){
  var GAPI="https://mri-academy-production.up.railway.app";
  var KEYNAME="gdcupKey";
  var TEAMS=[]; var SCORES={}; var round=3;
  var $=function(id){return document.getElementById(id);};
  function key(){ return sessionStorage.getItem(KEYNAME)||""; }
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
  function toast(t){ var m=$("msg"); m.textContent=t; m.classList.add("show"); clearTimeout(m._t); m._t=setTimeout(function(){m.classList.remove("show");},2200); }

  // ---- 게이트 ----
  function enter(){
    var k=$("keyInput").value.trim(); if(!k){return;}
    sessionStorage.setItem(KEYNAME,k);
    // 키 검증 겸 데이터 로드
    fetch(GAPI+"/api/gdcup-round-scores?round=3",{headers:{"x-admin-key":k}})
      .then(function(r){ if(r.status===401){throw new Error("키 오류");} return r.json(); })
      .then(function(){ $("gate").classList.add("hidden"); $("app").classList.remove("hidden"); boot(); })
      .catch(function(){ $("gateMsg").textContent="❌ 관리자 키가 올바르지 않습니다."; sessionStorage.removeItem(KEYNAME); });
  }
  $("keyBtn").addEventListener("click",enter);
  $("keyInput").addEventListener("keydown",function(e){ if(e.key==="Enter") enter(); });

  // ---- PUBG 자동 불러오기 (프리필) ----
  function cardByTeam(name){
    var found=null;
    Array.prototype.forEach.call($("list").querySelectorAll('.tcard'),function(card){
      var i=+card.getAttribute('data-i'); if(TEAMS[i] && TEAMS[i].team_name===name) found=card;
    });
    return found;
  }
  function autoPull(){
    var plat=$("apPlat").value, who=$("apWho").value.trim();
    if(!who){ toast("선수 닉 또는 매치ID를 입력하세요"); return; }
    var isMatch=/^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-/.test(who);
    var q=isMatch?("matchId="+encodeURIComponent(who)):("player="+encodeURIComponent(who));
    var btn=$("apBtn"); btn.disabled=true; var ot=btn.textContent; btn.textContent="불러오는 중…";
    fetch(GAPI+"/api/gdcup-match-pull?platform="+encodeURIComponent(plat)+"&"+q,{headers:{"x-admin-key":key()}})
      .then(function(r){ return r.json().then(function(d){ return {ok:r.ok,d:d}; }); })
      .then(function(res){
        btn.disabled=false; btn.textContent=ot;
        var d=res.d||{};
        if(!res.ok || !d.ok){
          var em={pubg_disabled:"PUBG 키 미설정",match_not_found:"매치 못 찾음",no_recent_match:"최근 매치 없음",rate_limit:"잠시 후 다시(레이트리밋)",unauthorized:"키 오류"};
          toast("실패: "+(em[d.error]||d.error||"오류")); return;
        }
        var filled=0;
        (d.teams||[]).forEach(function(t){
          var card=cardByTeam(t.team_name); if(!card) return;
          filled++;
          var plc=card.querySelector('.plc'); if(plc) plc.value=String(t.placement);
          var pmap={}; (t.players||[]).forEach(function(p){ pmap[String(p.ign).trim().toLowerCase()]=p.kills; });
          var anyPk=false;
          Array.prototype.forEach.call(card.querySelectorAll('.pk'),function(inp){
            var ign=String(inp.getAttribute('data-ign')||"").trim().toLowerCase();
            if(pmap[ign]!=null){ inp.value=pmap[ign]; anyPk=true; }
          });
          var players=card.querySelector('.players');
          if(anyPk && players && !players.classList.contains('show')) players.classList.add('show');
          if(anyPk){ syncSum(card); }
          else { var tk=card.querySelector('.tk'); if(tk){ tk.removeAttribute('readonly'); tk.value=t.team_kills; } }
          var b=card.querySelector('.save'); if(b){ b.classList.remove('done'); b.textContent='저장'; }
        });
        var msg="✅ "+filled+"팀 자동 입력 ("+(d.mode||"")+")";
        if(d.unmatched && d.unmatched.length) msg+=" · 미매칭 "+d.unmatched.length+"명(닉 확인)";
        if(!filled) msg="매칭된 팀이 없습니다 · 닉/플랫폼 확인";
        toast(msg);
      })
      .catch(function(){ btn.disabled=false; btn.textContent=ot; toast("네트워크 오류"); });
  }
  $("apBtn").addEventListener("click", autoPull);

  // ---- 데이터 ----
  function placementOptions(sel){
    var o='<option value="">순위</option>';
    for(var i=1;i<=16;i++){ o+='<option value="'+i+'"'+(String(sel)===String(i)?' selected':'')+'>'+i+'위</option>'; }
    return o;
  }
  function loadTeams(){
    return fetch(GAPI+"/api/gdcup-list").then(function(r){return r.json();}).then(function(d){ TEAMS=(d&&d.teams)||[]; });
  }
  function loadScores(){
    return fetch(GAPI+"/api/gdcup-round-scores?round="+round,{headers:{"x-admin-key":key()}})
      .then(function(r){return r.json();}).then(function(d){
        SCORES={}; ((d&&d.scores)||[]).forEach(function(s){ SCORES[s.team_name]=s; });
      });
  }
  function render(){
    var el=$("list"); 
    if(!TEAMS.length){ el.innerHTML='<div class="note">신청한 팀이 없습니다.</div>'; return; }
    el.innerHTML=TEAMS.map(function(t,i){
      var sc=SCORES[t.team_name]||{};
      var pk=sc.player_kills||[];
      var pkMap={}; pk.forEach(function(p){ pkMap[p.ign]=p.kills; });
      var hasPlayers = pk.length>0;
      var members=t.members||[];
      var prows=members.map(function(m){
        var v=(pkMap[m.ign]!=null)?pkMap[m.ign]:"";
        return '<div class="prow"><label>'+esc(m.ign||"-")+'</label>'
          +'<input class="pk" data-ign="'+esc(m.ign||"")+'" inputmode="numeric" placeholder="킬" value="'+v+'"></div>';
      }).join('');
      var tkVal = (sc.team_kills!=null && !hasPlayers) ? sc.team_kills : (hasPlayers ? sc.team_kills : "");
      return '<div class="tcard" data-i="'+i+'">'
        +'<div class="trow">'
          +'<span class="tn">'+esc(t.team_name)+'<span class="tw">×'+(t.weight!=null?t.weight:1)+'</span></span>'
          +'<select class="plc">'+placementOptions(sc.placement)+'</select>'
          +'<input class="tk" inputmode="numeric" placeholder="팀킬" value="'+(tkVal===""?"":tkVal)+'"'+(hasPlayers?' readonly':'')+'>'
          +'<button class="save'+(sc.team_name?' done':'')+'">'+(sc.team_name?'✓ 저장됨':'저장')+'</button>'
          +(members.length?'<button class="ptoggle">▸ 선수별 킬 ('+members.length+'명)</button>':'')
          +'<div class="players'+(hasPlayers?' show':'')+'">'+prows+'<div class="psum"></div></div>'
        +'</div></div>';
    }).join('');
    // 이벤트 바인딩
    Array.prototype.forEach.call(el.querySelectorAll('.tcard'),function(card){
      var i=+card.getAttribute('data-i');
      var ptog=card.querySelector('.ptoggle');
      if(ptog) ptog.addEventListener('click',function(){ togglePlayers(card); });
      card.querySelector('.save').addEventListener('click',function(){ saveTeam(card,i); });
      Array.prototype.forEach.call(card.querySelectorAll('.pk'),function(inp){ inp.addEventListener('input',function(){ syncSum(card); }); });
      // 값 바뀌면 저장표시 해제
      Array.prototype.forEach.call(card.querySelectorAll('select,input'),function(inp){ inp.addEventListener('input',function(){ var b=card.querySelector('.save'); b.classList.remove('done'); b.textContent='저장'; }); });
      if(card.querySelector('.players').classList.contains('show')) syncSum(card);
    });
  }
  function togglePlayers(card){
    var p=card.querySelector('.players'); if(!p) return;
    p.classList.toggle('show');
    syncSum(card);
  }
  function syncSum(card){
    var p=card.querySelector('.players'); var tk=card.querySelector('.tk'); var sum=0, any=false;
    Array.prototype.forEach.call(card.querySelectorAll('.pk'),function(inp){ if(inp.value!==""){any=true;} sum+=Number(inp.value)||0; });
    var show=p.classList.contains('show') && any;
    if(show){ tk.value=sum; tk.setAttribute('readonly','readonly'); card.querySelector('.psum').textContent='팀 총킬 = '+sum; }
    else { tk.removeAttribute('readonly'); card.querySelector('.psum').textContent=''; }
  }
  function teamPayload(card,i){
    var t=TEAMS[i];
    var plc=card.querySelector('.plc').value;
    var p=card.querySelector('.players');
    var usePlayers = p.classList.contains('show') && Array.prototype.some.call(card.querySelectorAll('.pk'),function(x){return x.value!=="";});
    var body={ round:round, team_name:t.team_name, placement: plc==="" ? null : Number(plc) };
    if(usePlayers){
      body.players = Array.prototype.map.call(card.querySelectorAll('.pk'),function(inp){ return {ign:inp.getAttribute('data-ign'), kills:Number(inp.value)||0}; });
    } else {
      var tk=card.querySelector('.tk').value;
      body.team_kills = tk==="" ? 0 : Number(tk)||0;
    }
    return body;
  }
  function saveTeam(card,i){
    var body=teamPayload(card,i);
    if(body.placement==null && (body.team_kills==null||body.team_kills===0) && !(body.players&&body.players.some(function(p){return p.kills>0;}))){
      toast("순위나 킬을 입력해주세요"); return;
    }
    var btn=card.querySelector('.save'); btn.textContent='저장중'; 
    return fetch(GAPI+"/api/gdcup-score",{method:"POST",headers:{"Content-Type":"application/json","x-admin-key":key()},body:JSON.stringify(body)})
      .then(function(r){return r.json();}).then(function(d){
        if(d&&d.ok){ btn.classList.add('done'); btn.textContent='✓ 저장됨'; toast(body.team_name+" 저장됨"); }
        else { btn.textContent='저장'; toast("실패: "+((d&&d.error)||"")); }
      }).catch(function(){ btn.textContent='저장'; toast("네트워크 오류"); });
  }
  $("saveAll").addEventListener("click",function(){
    var cards=Array.prototype.slice.call($("list").querySelectorAll('.tcard'));
    var todo=cards.filter(function(card){
      var b=teamPayload(card,+card.getAttribute('data-i'));
      return b.placement!=null || (b.team_kills>0) || (b.players&&b.players.some(function(p){return p.kills>0;}));
    });
    if(!todo.length){ toast("입력된 팀이 없습니다"); return; }
    var n=0;
    (function next(idx){
      if(idx>=todo.length){ toast("✅ "+n+"팀 저장 완료"); return; }
      Promise.resolve(saveTeam(todo[idx],+todo[idx].getAttribute('data-i'))).then(function(){ n++; setTimeout(function(){next(idx+1);},120); });
    })(0);
  });

  function switchRound(r){
    round=r;
    Array.prototype.forEach.call(document.querySelectorAll('.tabs button'),function(b){ b.classList.toggle('on', +b.getAttribute('data-r')===r); });
    loadScores().then(render);
  }
  Array.prototype.forEach.call(document.querySelectorAll('.tabs button'),function(b){
    b.addEventListener('click',function(){ switchRound(+b.getAttribute('data-r')); });
  });

  function boot(){ loadTeams().then(loadScores).then(render).catch(function(){ $("list").innerHTML='<div class="note">불러오기 실패 — 새로고침 해주세요.</div>'; }); }

  // 이미 키 있으면 바로
  if(key()){ $("keyInput").value=key(); enter(); }
})();
</script>
</body>
</html>
