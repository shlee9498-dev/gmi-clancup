<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>G드컵 운영진 · 스코어 입력</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
:root{--bg:#0a0a0c;--bg-card:#1a1a20;--bg-elev:#20202a;--ink:#f4f4f5;--ink-dim:#a1a1aa;--ink-faint:#71717a;--gold:#f5c518;--green:#10b981;--blue:#5ac8fa;--red:#e63946;--line:#27272a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:"Pretendard Variable",sans-serif;padding:16px;max-width:760px;margin:0 auto;}
h1{font-size:19px;margin-bottom:4px;}
.sub{color:var(--ink-dim);font-size:13px;margin-bottom:16px;}
.keybar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.keybar input{flex:1;min-width:150px;background:var(--bg-card);border:1px solid var(--line);color:var(--ink);padding:11px 13px;border-radius:8px;font-size:14px;}
.btn{border:none;border-radius:8px;padding:11px 14px;font-weight:800;font-size:13px;cursor:pointer;}
.btn-gold{background:var(--gold);color:#000;}
.btn-green{background:var(--green);color:#fff;}
.btn-ghost{background:var(--bg-card);color:var(--ink);border:1px solid var(--line);}
.warn{background:rgba(230,57,70,.1);border:1px solid var(--red);color:#fca5a5;padding:10px 13px;border-radius:8px;font-size:13px;margin-bottom:12px;}
.actbar{display:flex;gap:8px;margin:14px 0;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:5;flex-wrap:wrap;}
.actbar .btn{flex:1;min-width:130px;}
.rank{background:var(--bg-card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.rank h3{font-size:13px;color:var(--ink-dim);margin-bottom:8px;}
.rank ol{list-style:none;}
.rank li{display:flex;justify-content:space-between;padding:4px 0;font-size:13.5px;border-bottom:1px solid var(--line);}
.rank li:last-child{border:none;}
.rank .w{color:var(--gold);font-weight:800;}
.team{background:var(--bg-card);border:1px solid var(--line);border-radius:10px;padding:12px 13px;margin-bottom:9px;}
.team .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;gap:8px;}
.team .name{font-weight:800;font-size:15px;}
.team .wt{font-size:12px;color:var(--ink-faint);background:var(--bg-elev);padding:2px 8px;border-radius:20px;}
.inputs{display:grid;grid-template-columns:repeat(3,1fr) auto;gap:7px;align-items:center;}
.inputs label{display:block;}
.inputs small{color:var(--ink-faint);font-size:10.5px;display:block;margin-bottom:2px;text-align:center;}
.inputs input{width:100%;background:var(--bg-elev);border:1px solid var(--line);color:var(--ink);padding:9px;border-radius:7px;font-size:15px;text-align:center;}
.inputs .tot{font-weight:800;color:var(--gold);font-size:15px;min-width:60px;text-align:right;padding-left:6px;}
.msg{padding:16px;text-align:center;color:var(--ink-dim);}
.note{color:var(--ink-faint);font-size:11.5px;margin-top:4px;}
</style>
</head>
<body>
<h1>🏆 G드컵 운영진 — 스코어 입력</h1>
<p class="sub">팀별 R1/R2/R3 게임 점수만 입력하세요. 가중치 곱·순위 정렬·게시는 자동입니다.</p>

<div class="keybar">
  <input type="password" id="key" placeholder="운영진 키 (GDCUP_ADMIN_KEY)">
  <button class="btn btn-gold" onclick="saveKeyAndLoad()">불러오기</button>
</div>
<div id="warn"></div>

<div id="app" style="display:none;">
  <div class="actbar">
    <button class="btn btn-ghost" onclick="save(false)">💾 임시저장</button>
    <button class="btn btn-green" onclick="save(true)">📢 사이트·디코 게시</button>
  </div>
  <div class="rank"><h3>현재 순위 (실시간)</h3><ol id="rankList"></ol></div>
  <div id="teams"></div>
  <p class="note">※ 점수 = (R1+R2+R3) × 팀 가중치. 게시를 누르면 사이트 🏆스코어 + 디코 스코어 채널에 올라갑니다. 임시저장은 사이트엔 안 뜨고 입력만 보관.</p>
</div>
<div id="loadmsg" class="msg">키를 입력하고 불러오기를 누르세요.</div>

<script>
var GAPI="https://mri-academy-production.up.railway.app";
var TEAMS=[];
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
function getKey(){return document.getElementById('key').value.trim();}
function saveKeyAndLoad(){var k=getKey();if(k){try{sessionStorage.setItem('gdcupKey',k);}catch(e){}}load();}

function load(){
  var k=getKey(),warn=document.getElementById('warn');warn.innerHTML='';
  if(!k){warn.innerHTML='<div class="warn">키를 입력하세요.</div>';return;}
  document.getElementById('loadmsg').textContent='불러오는 중…';
  // 1) 확정/신청 팀 + 가중치
  fetch(GAPI+"/api/gdcup-admin-list",{headers:{"x-admin-key":k}})
  .then(function(r){if(r.status===401)throw new Error('unauthorized');return r.json();})
  .then(function(d){
    var teams=((d&&d.teams)||[]).filter(function(t){return t.status!=='cancelled';});
    TEAMS=teams.map(function(t){return {team_name:t.team_name,weight:(t.weight!=null?t.weight:1),r1:0,r2:0,r3:0};});
    // 2) 기존 저장 점수 prefill
    return fetch(GAPI+"/api/gdcup-scores").then(function(r){return r.json();}).then(function(sd){
      var prev=sd&&sd.scores&&sd.scores.ranking;
      if(prev){prev.forEach(function(p){var t=TEAMS.find(function(x){return x.team_name===p.team_name;});if(t){t.r1=p.r1||0;t.r2=p.r2||0;t.r3=p.r3||0;}});}
      renderTeams();
    });
  })
  .catch(function(e){
    document.getElementById('loadmsg').textContent='';
    if(String(e.message)==='unauthorized')warn.innerHTML='<div class="warn">❌ 키가 틀렸어요. Railway GDCUP_ADMIN_KEY와 똑같이 입력하세요.</div>';
    else warn.innerHTML='<div class="warn">불러오기 실패. 잠시 후 다시 시도하세요.</div>';
  });
}

function renderTeams(){
  document.getElementById('loadmsg').style.display='none';
  document.getElementById('app').style.display='block';
  var box=document.getElementById('teams');
  if(!TEAMS.length){box.innerHTML='<div class="msg">참가(확정/신청) 팀이 없어요. 먼저 신청/입금확정을 진행하세요.</div>';return;}
  box.innerHTML=TEAMS.map(function(t,i){
    return '<div class="team">'
      +'<div class="top"><span class="name">'+esc(t.team_name)+'</span><span class="wt">가중치 ×'+esc(t.weight)+'</span></div>'
      +'<div class="inputs">'
      +'<label><small>R1</small><input type="number" inputmode="numeric" value="'+(t.r1||'')+'" oninput="upd('+i+',1,this.value)"></label>'
      +'<label><small>R2</small><input type="number" inputmode="numeric" value="'+(t.r2||'')+'" oninput="upd('+i+',2,this.value)"></label>'
      +'<label><small>R3</small><input type="number" inputmode="numeric" value="'+(t.r3||'')+'" oninput="upd('+i+',3,this.value)"></label>'
      +'<span class="tot" id="tot'+i+'">'+wtd(t)+'</span>'
      +'</div></div>';
  }).join('');
  refreshRank();
}
function wtd(t){return Math.round(((Number(t.r1)||0)+(Number(t.r2)||0)+(Number(t.r3)||0))*(Number(t.weight)||1)*100)/100;}
function upd(i,r,v){TEAMS[i]['r'+r]=Number(v)||0;document.getElementById('tot'+i).textContent=wtd(TEAMS[i]);refreshRank();}
function refreshRank(){
  var sorted=TEAMS.map(function(t){return {n:t.team_name,w:wtd(t)};}).sort(function(a,b){return b.w-a.w;});
  document.getElementById('rankList').innerHTML=sorted.map(function(t,i){
    var m=["🥇","🥈","🥉"][i]||(i+1)+".";
    return '<li><span>'+m+' '+esc(t.n)+'</span><span class="w">'+t.w+'</span></li>';
  }).join('');
}
function save(publish){
  var k=getKey();if(!k)return;
  if(publish&&!confirm('현재 순위를 사이트·디코에 게시할까요?'))return;
  fetch(GAPI+"/api/gdcup-scores-save",{method:"POST",headers:{"Content-Type":"application/json","x-admin-key":k},body:JSON.stringify({teams:TEAMS,publish:!!publish})})
  .then(function(r){return r.json();})
  .then(function(d){if(d&&d.ok){alert(publish?'게시 완료! 사이트·디코에 반영됐어요.':'임시저장 완료.');}else{alert('실패: '+((d&&d.error)||''));}})
  .catch(function(){alert('네트워크 오류');});
}
(function(){try{var k=sessionStorage.getItem('gdcupKey');if(k){document.getElementById('key').value=k;load();}}catch(e){}})();
</script>
</body>
</html>
