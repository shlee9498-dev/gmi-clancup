<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#08080c">
  <meta name="gmi-api-base" content="https://worker-production-06b8.up.railway.app">
  <title>GmI 크래시</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="stylesheet" href="crash.css?v=1">
</head>
<body>

<main class="container">

  <!-- 라운드 헤더 -->
  <div class="crash-head">
    <div>
      <div class="round-no" id="round-no">라운드 #—</div>
      <div class="phase-tag" id="phase-tag">대기</div>
    </div>
    <div style="text-align:right;">
      <div class="meta-label" id="phase-label">로딩 중</div>
      <div class="meta-time" id="phase-time">—</div>
    </div>
  </div>

  <!-- 차트 -->
  <div class="chart-box">
    <canvas id="chart" width="800" height="480"></canvas>
    <div class="chart-overlay" id="chart-overlay">
      <div class="big-mult" id="big-mult">1.00x</div>
      <div class="big-mult-label" id="big-mult-label">베팅 진행 중</div>
    </div>
  </div>

  <!-- 메인 액션 (베팅 / 캐시아웃) -->
  <div class="action-area" id="action-area">
    <!-- JS에서 동적 렌더링 -->
  </div>

  <!-- 라운드 참여자 -->
  <section class="section">
    <div class="section-title">📊 라운드 참여자 <span id="participant-count" style="color:var(--text-dim); font-weight:400; font-size:12px;"></span></div>
    <div class="card" style="padding:12px 16px;">
      <div id="participants" class="participants">
        <div class="empty" style="text-align:center; padding:16px; color:var(--text-dim);">베팅 받는 중</div>
      </div>
    </div>
  </section>

  <!-- 최근 라운드 히스토리 -->
  <section class="section">
    <div class="section-title">최근 라운드</div>
    <div class="history-strip" id="history-strip">
      <div style="color: var(--text-dim); font-size: 13px; padding: 8px;">로딩 중</div>
    </div>
  </section>

  <!-- 내 베팅 이력 -->
  <section class="section">
    <div class="section-title-row">
      <div class="section-title">내 베팅 이력</div>
      <a href="#" id="verify-link" style="font-size:12px;">🔐 Provably-Fair 검증</a>
    </div>
    <div class="card">
      <table class="table" id="my-bets-table">
        <thead>
          <tr>
            <th>R#</th>
            <th class="amount">베팅</th>
            <th>결과</th>
            <th class="amount">변동</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4" class="empty">로딩 중</td></tr>
        </tbody>
      </table>
    </div>
  </section>

</main>

<!-- Provably-Fair 검증 모달 -->
<div id="verify-modal" class="modal hidden">
  <div class="modal-bg" onclick="closeVerify()"></div>
  <div class="modal-box">
    <div class="modal-head">
      <span>🔐 Provably-Fair 검증</span>
      <button onclick="closeVerify()" class="modal-close">✕</button>
    </div>
    <div class="modal-body" id="verify-body">
      <p style="font-size:13px; color:var(--text-sub);">
        라운드 ID를 입력하면 폭발 시점이 조작 없이 산출됐는지 직접 확인할 수 있습니다.
      </p>
      <div style="display:flex; gap:8px; align-items:center; margin: 12px 0;">
        <input type="number" id="verify-rid" placeholder="라운드 ID"
               style="flex:1; background:var(--panel-2); border:1px solid var(--border); color:var(--text); padding:10px; border-radius:8px; font-size:15px;">
        <button onclick="doVerify()" class="btn btn-outline" style="padding:8px 14px;">검증</button>
      </div>
      <div id="verify-result" style="font-family: monospace; font-size: 12px; color: var(--text-sub); white-space: pre-wrap;"></div>
    </div>
  </div>
</div>

<script src="app.js?v=4"></script>
<script src="crash.js?v=1"></script>

</body>
</html>
