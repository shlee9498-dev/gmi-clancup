<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#08080c">
  <meta name="gmi-api-base" content="https://worker-production-06b8.up.railway.app">
  <title>GmI 클랜 — 매치 히스토리</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.png">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<main class="container">

  <div class="section-title-row">
    <div class="section-title">📜 전체 매치 히스토리</div>
  </div>

  <div class="card" style="margin-bottom: 20px;">
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;">
      <button class="btn btn-outline game-btn active" data-game="all" style="padding:6px 14px; font-size:13px;">전체</button>
      <button class="btn btn-outline game-btn" data-game="duel" style="padding:6px 14px; font-size:13px;">🎯 1:1 인디언 포커</button>
      <button class="btn btn-outline game-btn" data-game="holdem" style="padding:6px 14px; font-size:13px;">🎴 헤즈업 홀덤</button>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn btn-outline filter-btn active" data-status="" style="padding:6px 14px; font-size:13px;">모든 상태</button>
      <button class="btn btn-outline filter-btn" data-status="in_progress" style="padding:6px 14px; font-size:13px;">진행 중</button>
      <button class="btn btn-outline filter-btn" data-status="ended" style="padding:6px 14px; font-size:13px;">종료</button>
      <button class="btn btn-outline filter-btn" data-status="pending" style="padding:6px 14px; font-size:13px;">대기</button>
    </div>
  </div>

  <div id="matches"><div class="loading">로딩 중</div></div>

  <section class="section" style="margin-top: 36px;">
    <div class="section-title">🏆 1:1 승수 순위</div>
    <div class="card">
      <table class="table" id="duel-wins-table">
        <thead>
          <tr>
            <th></th>
            <th>닉네임</th>
            <th class="amount">승수</th>
            <th class="amount">누적 수익</th>
          </tr>
        </thead>
        <tbody><tr><td colspan="4" class="loading">로딩 중</td></tr></tbody>
      </table>
    </div>
  </section>

</main>

<script src="app.js?v=4"></script>
<script>
const me = requireAuth();
if (me) {
  renderNav("matches");
  renderFooter();
  loadMatches();
  loadDuelWins();
}

let currentFilter = "";
let currentGame = "all";

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.status;
    loadMatches();
  });
});

document.querySelectorAll(".game-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".game-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentGame = btn.dataset.game;
    loadMatches();
  });
});

async function loadMatches() {
  const el = document.getElementById("matches");
  el.innerHTML = `<div class="loading">로딩 중</div>`;
  try {
    const fetches = [];
    if (currentGame === "all" || currentGame === "duel") {
      const path = currentFilter
        ? `/api/matches?limit=50&status=${currentFilter}`
        : `/api/matches?limit=50`;
      fetches.push(api(path).then(rows => rows.map(r => ({ ...r, _game: "duel" }))));
    }
    if (currentGame === "all" || currentGame === "holdem") {
      const path = currentFilter
        ? `/api/holdem?limit=50&status=${currentFilter}`
        : `/api/holdem?limit=50`;
      fetches.push(api(path).then(rows => rows.map(r => ({ ...r, _game: "holdem" }))));
    }
    const results = await Promise.allSettled(fetches);
    const all = results
      .filter(r => r.status === "fulfilled")
      .flatMap(r => r.value)
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    if (!all.length) {
      el.innerHTML = `<div class="empty">조건에 맞는 매치 없음</div>`;
      return;
    }
    el.innerHTML = `<div class="match-grid">${
      all.map(m => m._game === "holdem" ? holdemCardHTML(m) : matchCardHTML(m)).join("")
    }</div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty">로드 실패: ${e.message}</div>`;
  }
}

function matchCardHTML(m) {
  let statusClass = "ended";
  let statusLabel = "종료";
  if (m.status === "in_progress") { statusClass = "live"; statusLabel = "LIVE"; }
  else if (m.status === "pending") { statusClass = "pending"; statusLabel = "대기"; }
  else if (m.status === "expired") { statusLabel = "만료"; }
  else if (m.status === "declined") { statusLabel = "거절"; }
  const cName = m.challenger_name || "도전자";
  const oName = m.opponent_name || "상대";
  const winInfo = m.winner_id
    ? `<span style="color:var(--gold); font-size:12px">+${m.payout}</span>`
    : "";
  return `
    <a href="duel.html?id=${m.id}" class="match-card">
      <span class="status ${statusClass}">${statusLabel}</span>
      <div class="vs">
        <span style="font-size:11px; color:var(--text-dim); margin-right:4px;">🎯</span>
        <span class="name">${cName}</span>
        <span class="at">vs</span>
        <span class="name">${oName}</span>
      </div>
      <div class="round">
        ${m.current_round > 0 ? `R${m.current_round}/5` : ""}
        ${winInfo}
      </div>
    </a>
  `;
}

function holdemCardHTML(m) {
  let statusClass = "ended";
  let statusLabel = "종료";
  if (m.status === "in_progress") { statusClass = "live"; statusLabel = "LIVE"; }
  else if (m.status === "pending") { statusClass = "pending"; statusLabel = "대기"; }
  else if (m.status === "expired") { statusLabel = "만료"; }
  else if (m.status === "declined") { statusLabel = "거절"; }
  const cName = m.challenger_name || "도전자";
  const oName = m.opponent_name || "상대";
  return `
    <a href="holdem.html?id=${m.id}" class="match-card">
      <span class="status ${statusClass}">${statusLabel}</span>
      <div class="vs">
        <span style="font-size:11px; color:var(--text-dim); margin-right:4px;">🎴</span>
        <span class="name">${cName}</span>
        <span class="at">vs</span>
        <span class="name">${oName}</span>
      </div>
      <div class="round">${m.current_hand_no > 0 ? `H${m.current_hand_no}` : ""}</div>
    </a>
  `;
}

async function loadDuelWins() {
  const tbody = document.querySelector("#duel-wins-table tbody");
  try {
    const rows = await api("/api/ranking/duel-wins?limit=15");
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="4" class="empty">아직 승자 없음</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td class="rank ${r.rank === 1 ? 'r1' : ''}">${r.rank}</td>
        <td>${r.display_name}</td>
        <td class="amount">${r.wins}승</td>
        <td class="amount pos">+${fmtCoin(r.total_payout)}</td>
      </tr>
    `).join("");
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="4" class="empty">로드 실패</td></tr>`;
  }
}
</script>

<style>
.filter-btn.active, .game-btn.active {
  background: var(--gold);
  color: #1a1310;
  border-color: var(--gold);
}
</style>

</body>
</html>
