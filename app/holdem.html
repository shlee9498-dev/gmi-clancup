<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#08080c">
  <meta name="gmi-api-base" content="https://worker-production-06b8.up.railway.app">
  <title>GmI 클랜 — 헤즈업 홀덤 라이브</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.png">
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="stylesheet" href="holdem.css?v=1">
</head>
<body>

<main class="container">

  <div class="section-title-row">
    <div class="section-title" id="title">1:1 헤즈업 홀덤</div>
    <a href="index.html" style="font-size:13px">← 대시보드</a>
  </div>

  <div id="board"><div class="loading">매치 불러오는 중</div></div>

  <section class="section" style="margin-top: 28px;">
    <div class="section-title">핸드 히스토리</div>
    <div class="card">
      <table class="table" id="hands-table">
        <thead>
          <tr>
            <th>핸드</th>
            <th>딜러</th>
            <th class="amount">폿</th>
            <th>결과</th>
          </tr>
        </thead>
        <tbody><tr><td colspan="4" class="empty">아직 핸드 없음</td></tr></tbody>
      </table>
    </div>
  </section>

  <p style="text-align: center; color: var(--text-dim); margin-top: 28px; font-size: 13px;">
    💌 본인 hole 카드는 디스코드 DM으로 받으세요.<br>
    채널에서 <code>/홀덤콜</code> · <code>/홀덤레이즈 amount:N</code> ·
    <code>/홀덤폴드</code> · <code>/홀덤체크</code> · <code>/홀덤올인</code>
  </p>

</main>

<script src="app.js?v=4"></script>
<script src="holdem.js?v=1"></script>

</body>
</html>
