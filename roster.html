<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRI Academy | G드컵 실시간 명단</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05050a; --card: #0f0f1e; --accent: #bf00ff;
            --t1: #ff2525; --t2: #a855f7; --t3: #00c8ff; --t4: #f97316;
            --text: #ffffff; --muted: rgba(255,255,255,0.5);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding-bottom: 50px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        /* 헤더 & 강사진 */
        .header { text-align: center; padding: 40px 0; background: linear-gradient(to bottom, #1a1a3a, var(--bg)); border-radius: 0 0 40px 40px; }
        .staff-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 30px; }
        .staff-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid var(--accent); }
        .staff-card h4 { margin: 5px 0; color: var(--accent); font-size: 14px; }
        .staff-card p { font-size: 11px; margin: 0; color: var(--muted); }

        /* 티어 섹션 */
        .tier-filter { display: flex; gap: 10px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
        .f-btn { padding: 8px 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); background: none; color: #fff; cursor: pointer; font-weight: bold; }
        .f-btn.t1 { border-color: var(--t1); color: var(--t1); }
        .f-btn.t2 { border-color: var(--t2); color: var(--t2); }
        .f-btn.t3 { border-color: var(--t3); color: var(--t3); }
        .f-btn.t4 { border-color: var(--t4); color: var(--t4); }

        /* 카드 그리드 */
        .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .p-card { background: var(--card); border-radius: 15px; padding: 15px; position: relative; border-left: 5px solid #ccc; }
        .p-card.tier1 { border-left-color: var(--t1); }
        .p-card.tier2 { border-left-color: var(--t2); }
        .p-card.tier3 { border-left-color: var(--t3); }
        .p-card.tier4 { border-left-color: var(--t4); }
        
        .p-name { font-size: 18px; font-weight: 900; margin-bottom: 5px; }
        .p-stat { display: flex; justify-content: space-between; font-size: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .p-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; padding: 2px 8px; border-radius: 5px; background: rgba(255,255,255,0.1); }
        
        .stats-val { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="font-family:'Black Han Sans'; font-size: 40px; margin: 0;">G-CUP SEASON 1</h1>
    <p style="color: var(--accent); font-weight: bold;">총 예산 6억 코인 | 64인 경매 배틀</p>
    
    <div class="container">
        <div class="staff-grid">
            <div class="staff-card"><h4>이무리</h4><p>메인 강사/총괄</p></div>
            <div class="staff-card"><h4>트레이너 A</h4><p>피지컬/감도교정</p></div>
            <div class="staff-card"><h4>트레이너 B</h4><p>하드웨어/반동제어</p></div>
            <div class="staff-card"><h4>한도은</h4><p>실전 전술/오더</p></div>
        </div>
    </div>
</div>

<div class="container">
    <div class="tier-filter">
        <button class="f-btn t1">Tier 1 (절대화력)</button>
        <button class="f-btn t2">Tier 2 (전술핵)</button>
        <button class="f-btn t3">Tier 3 (1인분)</button>
        <button class="f-btn t4">Tier 4 (변수창출)</button>
    </div>

    <div class="player-grid" id="playerGrid">
        </div>
</div>

<script>
    const players = [
        { name: "현성", tier: 1, g: "G", kda: 2.3, dmg: 403, pos: "메인딜러", id: "Gml_Hyun" },
        { name: "박박", tier: 1, g: "m", kda: 7.6, dmg: 842, pos: "올라운더", id: "Gml_rR" },
        { name: "똑불", tier: 2, g: "I", kda: 1.3, dmg: 225, pos: "서브오더", id: "1ill1llll" },
        { name: "세휘", tier: 3, g: "I", kda: 1.4, dmg: 244, pos: "엔트리", id: "Gml_bird" },
        { name: "심플", tier: 4, g: "I", kda: 0.7, dmg: 166, pos: "서포터", id: "Gml_Simple" },
        // ... 추가 40명 데이터 입력 가능
    ];

    const grid = document.getElementById('playerGrid');
    players.forEach(p => {
        grid.innerHTML += `
            <div class="p-card tier${p.tier}">
                <div class="p-badge">Tier ${p.tier}</div>
                <div class="p-name">${p.name} <small style="font-size:10px; color:var(--muted)">${p.id}</small></div>
                <div style="font-size:11px; color:var(--accent)">Grade: ${p.g}</div>
                <div class="p-stat">
                    <span>KDA <span class="stats-val">${p.kda}</span></span>
                    <span>AVG DMG <span class="stats-val">${p.dmg}</span></span>
                </div>
                <div style="font-size:10px; margin-top:5px; color:var(--muted)">포지션: ${p.pos}</div>
            </div>
        `;
    });
</script>
</body>
</html>
