function useCountUp(target,dur=1400){
  const [v,setV]=useState(0);
  const started=useRef(false);
  const ref=useRef(null);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting&&!started.current){
        started.current=true;
        const t0=Date.now();
        const tick=()=>{
          const p=Math.min((Date.now()-t0)/dur,1);
          setV(Math.floor(p*p*target));
          if(p<1)requestAnimationFrame(tick);else setV(target);
        };
        requestAnimationFrame(tick);
      }
    },{threshold:.3});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[target,dur]);
  return[v,ref];
}

function useReveal(){
  const ref=useRef(null);
  const[vis,setVis]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true)},{threshold:.08});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[]);
  return[ref,vis];
}

              {msgs.map((m,i)=>(
                <div key={i} className="cmsg" style={{display:"flex",
                  flexDirection:m.role==="user"?"row-reverse":"row",alignItems:"flex-end"}}>
                  <div style={{maxWidth:"85%",padding:"9px 12px",borderRadius:"10px",
                    fontSize:".78rem",lineHeight:1.7,whiteSpace:"pre-wrap",
                    background:m.role==="user"?GLD:S2,color:m.role==="user"?"#000":TX,
                    border:m.role==="user"?"none":"1px solid rgba(255,184,0,.1)",
                    borderBottomRightRadius:m.role==="user"?"3px":"10px",
                    borderBottomLeftRadius:m.role==="assistant"?"3px":"10px"}}>
                    {m.content}
                  </div>
                </div>
              ))}
              {loading&&(
                <div style={{display:"flex"}}>
                  <div style={{background:S2,border:"1px solid rgba(255,184,0,.1)",
                    borderRadius:"10px",borderBottomLeftRadius:"3px",padding:"10px 14px"}}>
                    <span className="dot1"/><span className="dot2"/><span className="dot3"/>
                  </div>
                </div>
              )}
            </div>
            {/* Quick replies */}
            <div style={{padding:"0 12px 8px",display:"flex",gap:"6px",flexWrap:"wrap",flexShrink:0}}>
              {QRS.map(q=>(
                <button key={q} onClick={()=>send(q)} className="qb"
                  style={{background:"transparent",border:"1px solid rgba(255,184,0,.28)",
                    color:GLD,fontSize:".65rem",padding:"4px 9px",borderRadius:"20px",
                    cursor:"pointer",fontFamily:"inherit"}}>
                  {q}
                </button>
              ))}
            </div>
            {/* Input */}
            <div style={{padding:"10px 12px 14px",borderTop:"1px solid rgba(255,184,0,.1)",
              display:"flex",gap:"8px",flexShrink:0}}>
              <input className="ch-inp" value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&send()}
                placeholder="무엇이든 물어보세요..."
                style={{flex:1,background:"#0A0A14",border:"1px solid rgba(255,184,0,.15)",
                  color:TX,padding:"9px 12px",borderRadius:"6px",fontSize:".78rem",
                  fontFamily:"inherit",outline:"none",transition:"border-color .2s"}}
                onFocus={e=>e.target.style.borderColor=GLD}
                onBlur={e=>e.target.style.borderColor="rgba(255,184,0,.15)"}/>
              <button onClick={()=>send()} disabled={loading}
                style={{background:GLD,color:"#000",border:"none",width:"38px",height:"38px",
                  borderRadius:"6px",cursor:"pointer",fontSize:"1rem",opacity:loading?.5:1}}>↑</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
