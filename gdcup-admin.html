<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>G드컵 운영진 · 입금 확정</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
:root{--bg:#0a0a0c;--bg-card:#1a1a20;--bg-elev:#20202a;--ink:#f4f4f5;--ink-dim:#a1a1aa;--ink-faint:#71717a;--gold:#f5c518;--green:#10b981;--blue:#5ac8fa;--red:#e63946;--line:#27272a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:"Pretendard Variable",sans-serif;padding:18px;max-width:720px;margin:0 auto;}
h1{font-size:20px;margin-bottom:4px;}
.sub{color:var(--ink-dim);font-size:13px;margin-bottom:18px;}
.keybar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.keybar input{flex:1;min-width:160px;background:var(--bg-card);border:1px solid var(--line);color:var(--ink);padding:11px 13px;border-radius:8px;font-size:14px;}
.btn{border:none;border-radius:8px;padding:11px 14px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-gold{background:var(--gold);color:#000;}
.btn-ghost{background:var(--bg-card);color:var(--ink);border:1px solid var(--line);}
.stat{font-size:13px;color:var(--ink-dim);margin-bottom:12px;}
.stat b{color:var(--gold);font-size:16px;}
.card{background:var(--bg-card);border:1px solid var(--line);border-radius:11px;padding:14px 15px;margin-bottom:10px;}
.card.confirmed{border-color:var(--green);}
.row1{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.tname{font-size:16px;font-weight:800;}
.badge{font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.b-applied{background:rgba(161,161,170,.15);color:var(--ink-dim);}
.b-confirmed{background:rgba(16,185,129,.15);color:var(--green);}
.b-cancelled{background:rgba(230,57,70,.15);color:var(--red);}
.meta{color:var(--ink-dim);font-size:12.5px;margin:3px 0;}
.meta b{color:var(--ink);}
.contact{color:var(--blue);font-size:12.5px;margin:5px 0;}
.acts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
.acts button{flex:1;min-width:90px;padding:9px;border-radius:7px;border:1px solid var(--line);background:var(--bg-elev);color:var(--ink);font-weight:700;font-size:12.5px;cursor:pointer;}
.acts .ok{border-color:var(--green);color:var(--green);}
.acts .wait{color:var(--ink-dim);}
.acts .del{border-color:var(--red);color:var(--red);}
.msg{padding:14px;text-align:center;color:var(--ink-dim);}
.warn{background:rgba(230,57,70,.1);border:1px solid var(--red);color:#fca5a5;padding:10px 13px;border-radius:8px;font-size:13px;margin-bottom:12px;}
</style>
</head>
<body>
<h1>🏆 G드컵 운영진 — 입금 확정</h1>
<p class="sub">입금 확인한 팀에 ✅확정을 누르면 사이트 명단·디스코드에 자동 반영됩니다. (운영진 전용)</p>

<div class="keybar">
  <input type="password" id="key" placeholder="운영진 키 입력 (GDCUP_ADMIN_KEY)">
  <button class="btn btn-gold" onclick="saveKeyAndLoad()">불러오기</button>
</div>
<div id="warn"></div>
<div class="stat" id="stat"></div>
<div id="list"><div class="msg">키를 입력하고 불러오기를 누르세요.</div></div>

<h2 style="font-size:16px;margin:22px 0 8px;">🙋 솔로 / 용병 대기</h2>
<div id="soloAdminList"></div>

<script>
var GAPI="https://mri-academy-production.up.railway.app";
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
function getKey(){return document.getElementById('key').value.trim();}
function saveKeyAndLoad(){var k=getKey(); if(k){try{sessionStorage.setItem('gdcupKey',k);}catch(e){}} loadAdmin();}

function loadAdmin(){
  var k=getKey(); var warn=document.getElementById('warn'); warn.innerHTML='';
  if(!k){warn.innerHTML='<div class="warn">키를 입력하세요.</div>';return;}
  document.getElementById('list').innerHTML='<div class="msg">불러오는 중…</div>';
  fetch(GAPI+"/api/gdcup-admin-list",{headers:{"x-admin-key":k}})
  .then(function(r){
    if(r.status===401){throw new Error('unauthorized');}
    return r.json();
  })
  .then(function(d){render((d&&d.teams)||[]);loadSolosAdmin();})
  .catch(function(e){
    document.getElementById('list').innerHTML='';
    if(String(e.message)==='unauthorized') warn.innerHTML='<div class="warn">❌ 키가 틀렸어요. Railway의 GDCUP_ADMIN_KEY 값과 똑같이 입력하세요.</div>';
    else warn.innerHTML='<div class="warn">불러오기 실패. 잠시 후 다시 시도하세요.</div>';
  });
}

function render(teams){
  var applied=0,confirmed=0;
  teams.forEach(function(t){ if(t.status==='confirmed')confirmed++; else if(t.status!=='cancelled')applied++; });
  document.getElementById('stat').innerHTML='✅ 확정 <b>'+confirmed+'</b> · ⏳ 신청 <b>'+applied+'</b> / 16팀';
  var el=document.getElementById('list');
  if(!teams.length){el.innerHTML='<div class="msg">아직 신청한 팀이 없어요.</div>';return;}
  el.innerHTML=teams.map(function(t){
    var st=t.status||'applied';
    var badge=st==='confirmed'?'<span class="badge b-confirmed">✅ 확정</span>':(st==='cancelled'?'<span class="badge b-cancelled">🗑 취소</span>':'<span class="badge b-applied">⏳ 신청</span>');
    var mem=(t.members||[]).filter(function(m){return m.ign;}).map(function(m){return esc(m.ign)+(m.tier?' ('+esc(m.tier)+')':'');}).join(' · ');
    return '<div class="card '+(st==='confirmed'?'confirmed':'')+'">'
      +'<div class="row1"><span class="tname">'+esc(t.team_name)+'</span>'+badge+'</div>'
      +(t.slogan?'<div class="meta">“'+esc(t.slogan)+'”</div>':'')
      +'<div class="meta">멤버: '+(mem||'-')+'</div>'
      +'<div class="meta">팀 BPI: <b>'+esc(t.bpi)+'</b>'+(t.weight!=null?' (가중치 ×'+esc(t.weight)+')':'')+'</div>'
      +'<div class="contact">📞 연락/입금자: '+esc(t.contact||'-')+'</div>'
      +'<div class="acts">'
      +'<button class="ok" onclick="setStatus('+t.id+',\'confirmed\')">✅ 입금확정</button>'
      +'<button class="wait" onclick="setStatus('+t.id+',\'applied\')">↩️ 신청대기</button>'
      +'<button class="del" onclick="setStatus('+t.id+',\'cancelled\')">🗑 취소</button>'
      +'</div></div>';
  }).join('');
}

function setStatus(id,status){
  var k=getKey(); if(!k)return;
  if(status==='cancelled' && !confirm('이 팀을 취소(명단에서 제외)할까요?'))return;
  fetch(GAPI+"/api/gdcup-confirm",{method:"POST",headers:{"Content-Type":"application/json","x-admin-key":k},body:JSON.stringify({id:id,status:status})})
  .then(function(r){return r.json();})
  .then(function(d){ if(d&&d.ok){loadAdmin();} else {alert('처리 실패: '+((d&&d.error)||''));} })
  .catch(function(){alert('네트워크 오류');});
}

function loadSolosAdmin(){
  var k=getKey(); if(!k)return;
  fetch(GAPI+"/api/gdcup-solo-admin",{headers:{"x-admin-key":k}})
  .then(function(r){return r.json();}).then(function(d){renderSolos((d&&d.solos)||[]);}).catch(function(){});
}
function renderSolos(solos){
  var el=document.getElementById('soloAdminList'); if(!el)return;
  var act=solos.filter(function(s){return s.status!=='cancelled';});
  if(!act.length){el.innerHTML='<div class="msg">솔로/용병 신청이 없어요.</div>';return;}
  el.innerHTML=act.map(function(s){
    var st=s.status||'waiting';
    var badge=st==='matched'?'<span class="badge b-confirmed">✅ 매칭완료</span>':'<span class="badge b-applied">⏳ 대기</span>';
    var kind=s.kind==='short'?'👥 자리모집':'🙋 솔로';
    return '<div class="card '+(st==='matched'?'confirmed':'')+'">'
      +'<div class="row1"><span class="tname">'+esc(s.ign)+' <span style="font-size:12px;color:var(--ink-faint);font-weight:400;">'+kind+'</span></span>'+badge+'</div>'
      +(s.tier?'<div class="meta">티어: <b>'+esc(s.tier)+'</b></div>':'')
      +(s.note?'<div class="meta">한마디: '+esc(s.note)+'</div>':'')
      +'<div class="contact">💬 디스코드: '+esc(s.discord||'-')+'</div>'
      +'<div class="acts">'
      +'<button class="ok" onclick="setSolo('+s.id+',\'matched\')">✅ 매칭완료</button>'
      +'<button class="wait" onclick="setSolo('+s.id+',\'waiting\')">↩️ 대기</button>'
      +'<button class="del" onclick="setSolo('+s.id+',\'cancelled\')">🗑 취소</button>'
      +'</div></div>';
  }).join('');
}
function setSolo(id,status){
  var k=getKey(); if(!k)return;
  if(status==='cancelled' && !confirm('이 신청을 취소(명단에서 제외)할까요?'))return;
  fetch(GAPI+"/api/gdcup-solo-status",{method:"POST",headers:{"Content-Type":"application/json","x-admin-key":k},body:JSON.stringify({id:id,status:status})})
  .then(function(r){return r.json();}).then(function(d){if(d&&d.ok)loadSolosAdmin();else alert('처리 실패');}).catch(function(){alert('네트워크 오류');});
}

// 세션에 저장된 키 있으면 자동 로드
(function(){try{var k=sessionStorage.getItem('gdcupKey'); if(k){document.getElementById('key').value=k; loadAdmin();}}catch(e){}})();
</script>
</body>
</html>
